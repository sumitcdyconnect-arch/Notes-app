{% extends "base.html" %}

{% block content %}
    <a href="/menu"><button>Back to Menu</button></a>
    {% if notes %}
    {% for note in notes %}
        <div>
            <h2>{{ note.title }}</h2>
            <p>{{ note.content }}</p>
            <form action="/delete/{{ note.id }}" method="POST">
                <button type="submit">Delete</button>
            </form>
        </div>
    {% endfor %}
{% else %}
    <p>No notes yet. Create one!</p>
{% endif %}
    
{% endblock %}
