<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Notes</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
    </style>
</head>
<body>
    
    {% for note in notes %}
        <div>
            <h2>{{ note.title }}</h2>
            <p>{{ note.content }}</p>
            <form action="/delete/{{ loop.index0 }}" method="POST">
                <button type="submit">Delete</button>
            </form>
        </div>
    {% endfor %}


    
</body>
</html>
