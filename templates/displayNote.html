{% extends "base.html" %}

{% block content %}
    
    {% for note in notes %}
        <div>
            <h2>{{ note.title }}</h2>
            <p>{{ note.content }}</p>
            <form action="/delete/{{ loop.index0 }}" method="POST">
                <button type="submit">Delete</button>
            </form>
        </div>
    {% endfor %}

{% endblock %}
